services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env.hetzner
    environment:
      BM_DATABASE_URL: ${BM_DATABASE_URL}
      BM_ENABLE_SCHEDULER: "false"
      BM_CORS_ORIGINS: ${BM_CORS_ORIGINS}
      BM_LOG_LEVEL: ${BM_LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/app/docker/backend-entrypoint.sh", "uvicorn", "bettingmaster.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    env_file:
      - .env.hetzner
    environment:
      BM_DATABASE_URL: ${BM_DATABASE_URL}
      BM_ENABLE_SCHEDULER: "false"
      BM_LOG_LEVEL: ${BM_LOG_LEVEL:-INFO}
    depends_on:
      backend:
        condition: service_healthy
    command: ["sh", "/app/docker/worker-entrypoint.sh"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
